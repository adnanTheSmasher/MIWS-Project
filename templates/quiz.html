<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gesture Quiz · MIWS</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <!-- FIX 6: /static/css/ not ../static/css/ -->
  <link rel="stylesheet" href="/static/css/quiz.css" />
</head>
<body>

  <nav>
    <a href="#" class="nav-back" onclick="stopAndGoHome()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back
    </a>
    <div class="nav-title">🃏 Gesture Quiz</div>
    <div class="nav-detection">
      <span class="det-dot" id="detDot"></span>
      <span id="detText">Waiting for hand...</span>
    </div>
  </nav>

  <main>

    <div class="top-bar">
      <div class="score-block">
        <div class="score-label">Question</div>
        <div class="score-value" id="questionNum">1 / 10</div>
      </div>
      <div class="progress-wrap">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="score-block right">
        <div class="score-label">Score</div>
        <div class="score-value" id="scoreVal">0</div>
      </div>
    </div>

    <div class="question-card">
      <div class="q-category" id="qCategory">Loading...</div>
      <div class="q-text" id="qText">Please wait...</div>
    </div>

    <div class="options-grid">
      <div class="option" id="opt0">
        <div class="option-top"><span class="opt-letter">A</span><span class="opt-text" id="optText0">—</span></div>
        <div class="hold-bar-wrap"><div class="hold-bar-fill" id="ring0"></div></div>
      </div>
      <div class="option" id="opt1">
        <div class="option-top"><span class="opt-letter">B</span><span class="opt-text" id="optText1">—</span></div>
        <div class="hold-bar-wrap"><div class="hold-bar-fill" id="ring1"></div></div>
      </div>
      <div class="option" id="opt2">
        <div class="option-top"><span class="opt-letter">C</span><span class="opt-text" id="optText2">—</span></div>
        <div class="hold-bar-wrap"><div class="hold-bar-fill" id="ring2"></div></div>
      </div>
      <div class="option" id="opt3">
        <div class="option-top"><span class="opt-letter">D</span><span class="opt-text" id="optText3">—</span></div>
        <div class="hold-bar-wrap"><div class="hold-bar-fill" id="ring3"></div></div>
      </div>
    </div>

    <div class="hint-bar">
      <div class="hint" id="h1">☝️ <b>1</b> = A</div>
      <div class="hint" id="h2">✌️ <b>2</b> = B</div>
      <div class="hint" id="h3">🤟 <b>3</b> = C</div>
      <div class="hint" id="h4">🖐️ <b>4</b> = D</div>
    </div>

    <div class="status-bar" id="statusBar">
      <span id="statusMsg">Hold a finger for 1.5s to confirm your answer.</span>
    </div>

    <div style="text-align:center; margin-top: 8px;">
      <!-- FIX 3: Stop Quiz calls /quiz/stop before navigating -->
      <button onclick="stopQuiz()" class="rbtn secondary">Stop Quiz</button>
    </div>

  </main>

  <div class="result-overlay" id="resultOverlay">
    <div class="result-card">
      <div class="result-emoji" id="resultEmoji">🎉</div>
      <h2 class="result-title" id="resultTitle">Quiz Complete!</h2>
      <div class="result-score-row">
        <span class="result-big" id="finalScore">0</span>
        <span class="result-total" id="finalTotal">/ 10</span>
      </div>
      <p class="result-msg" id="resultMsg">Great job!</p>
      <div class="result-btns">
        <button class="rbtn primary" onclick="restartQuiz()">Play Again</button>
        <!-- FIX 3: Home button also stops camera -->
        <button class="rbtn secondary" onclick="stopQuiz()">Home</button>
      </div>
    </div>
  </div>

  <!-- FIX 7: correct script path /static/js/ -->
  <script src="/static/scripts/quiz.js"></script>
</body>
</html>
