<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Air Canvas · MIWS</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/canvas.css') }}" />
</head>
<body>

  <nav>
    <a href="/" class="nav-back">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back to Suite
    </a>
    <div class="nav-title">🖐️ Air Canvas</div>
    <div></div>
  </nav>

  <main>
    <div class="launch-card">

      <div class="launch-icon">🖐️</div>
      <h1 class="launch-title">Air Canvas</h1>
      <p class="launch-desc">
        Your painter opens in a separate window.<br>
        Use hand gestures to draw, pick colors, and erase.
      </p>

      <div class="gesture-grid">
        <div class="gesture-item">
          <span class="gesture-emoji">☝️</span>
          <div class="gesture-label">Index Finger</div>
          <div class="gesture-sub">Draw mode</div>
        </div>
        <div class="gesture-item">
          <span class="gesture-emoji">✌️</span>
          <div class="gesture-label">Two Fingers</div>
          <div class="gesture-sub">Select color</div>
        </div>
        <div class="gesture-item">
          <span class="gesture-emoji">✊</span>
          <div class="gesture-label">Fist</div>
          <div class="gesture-sub">Clear canvas</div>
        </div>
        <div class="gesture-item">
          <span class="gesture-emoji">⌨️</span>
          <div class="gesture-label">Press Q</div>
          <div class="gesture-sub">Quit painter</div>
        </div>
      </div>

      <button class="launch-btn" id="launchBtn" onclick="launchCanvas()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="9" r="8" stroke="currentColor" stroke-width="1.5"/>
          <polygon points="7,5.5 13,9 7,12.5" fill="currentColor"/>
        </svg>
        Launch Painter
      </button>

      <div class="status-msg" id="statusMsg">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Ready to launch</span>
      </div>

    </div>
  </main>

  <script src="{{ url_for('static', filename='js/canvas.js') }}"></script>
</body>
</html>
